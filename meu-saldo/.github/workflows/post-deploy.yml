name: Post-deploy smoke check

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check production services
        run: python scripts/post_deploy_check.py
